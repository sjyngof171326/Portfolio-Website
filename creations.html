<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Permanent+Marker&display=swap" rel="stylesheet">
        <script src="creations.js" defer></script>
        <title>Kaws</title>
    </head>

    <body>
        <div class="stickers-layer"></div>
        <main>
            <header class="site-header" id="siteHeader">
                <a href="index.html#cover" class="logo-links">
                    <img src="logo.png" class="logo" alt="logo">
                </a>
                <nav class="nav-links">
                    <a href="index.html#about" class="nav-about">About</a>
                    <a href="creations.html" class="nav-creations">
                        <img src="creations-spray.png" class="nav-spray nav-spray-creations" alt="">
                        <span>Creations</span>
                    </a>
                    <a href="exhibitions.html">Exhibitions</a>
                    <a href="collaborations.html">Collaborations</a>
                    <a href="index.html#contact" class="nav-contact">Contact</a>
                </nav>
            </header>

            <section class="creationspage">
                <div class="characters-section">

                    <div class="companion-info">
                        <img src="companion-spray.png" class="companion-spray" id="characterSpray" alt="companion-spray">

                        <h1 id="characterTitle">Companion</h1>

                        <p id="characterText1"></p>
                        <p id="characterText2"></p>
                        <p id="characterText3"></p>
                        <p id="characterText4"></p>
                        <p id="characterText5"></p>
                    </div>

                    <div class="characters-visual" id="cardStack">
                        <img src="kawscompanion.png" class="stack-card pos-0" data-character="companion" alt="Companion">
                        <img src="kawschum.png" class="stack-card pos-1" data-character="chum" alt="Chum">
                        <img src="kawsbff.png" class="stack-card pos-2" data-character="bff" alt="BFF">
                        <img src="kawsaccomplice.png" class="stack-card pos-3" data-character="accomplice" alt="Accomplice">
                        <img src="kawsbendy.png" class="stack-card pos-4" data-character="bendy" alt="Bendy">
                    </div>
                </div>
            </section>
        </main>   
    </body>
</html>
